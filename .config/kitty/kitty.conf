# Black Boxxy theme for Kitty
font_family Iosevka Nerd Font
bold_font Iosevka Nerd Font Bold
italic_font Iosevka Nerd Font Italic
bold_italic_font Iosevka Nerd Font Bold Italic
font_size 12

foreground #e0e0e0
background #000000
selection_foreground #000000
selection_background #00b8d4

url_color #2979ff
cursor #00b8d4
cursor_text_color #000000

# Black
color0 #0d0d0d
color8 #2a2a2a

# Red
color1 #ff1744
color9 #ff1744

# Green
color2 #00e676
color10 #00e676

# Yellow
color3 #ffea00
color11 #ffea00

# Blue
color4 #2979ff
color12 #2979ff

# Magenta
color5 #d500f9
color13 #d500f9

# Cyan
color6 #00b8d4
color14 #00e5ff

# White
color7 #b0b0b0
color15 #ffffff

active_border_color #00b8d4
inactive_border_color #2a2a2a
bell_border_color #ffea00

window_margin_width 4
window_padding_width 2

confirm_os_window_close 0

enable_audio_bell no

shell .
