music_directory    "~/Music/music"
playlist_directory "~/Music/playlists"
db_file            "~/.config/mpd/db"
state_file         "~/.config/mpd/state"
pid_file           "/tmp/mpd.pid"
log_file           "~/.config/mpd/log"

audio_output {
    type    "pulse"
    name    "Pulse Output"
}

bind_to_address "127.0.0.1"
port "6600"

auto_update "yes"
